name: Build Portfolio Multiarch

on:
  workflow_call:
    inputs:
      push_image:
        required: false
        type: boolean
        default: false
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    outputs:
      hash: ${{ steps.vars.outputs.hash }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Get short commit hash
        id: vars
        run: echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      # local build for audit
      - name: Build AMD64 (local)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: frontend-prod
          platforms: linux/amd64
          load: true
          push: false
          tags: local-portfolio:website

      - name: Run audit
        run: |
          docker run --rm local-portfolio:website \
            sh -c "pnpm i && pnpm audit"

      # push AMD64
      - name: Build & Push AMD64
        if: ${{ inputs.push_image }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: frontend-prod
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            johngh/personal-website:portfolio-amd64
            johngh/personal-website:portfolio-amd64-${{ steps.vars.outputs.hash }}


  build-arm64:
    runs-on: ubuntu-24.04-arm
    needs: build-amd64

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build & Push ARM64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: frontend-prod
          platforms: linux/arm64
          push: true
          provenance: false
          tags: |
            johngh/personal-website:portfolio-arm64
            johngh/personal-website:portfolio-arm64-${{ needs.build-amd64.outputs.hash }}


  merge-manifest:
    runs-on: ubuntu-latest
    needs:
      - build-amd64
      - build-arm64

    steps:
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Create & Push Multi-Arch Manifest
        run: |
          docker buildx imagetools create \
            -t johngh/personal-website:portfolio \
            -t johngh/personal-website:portfolio-${{ needs.build-amd64.outputs.hash }} \
            johngh/personal-website:portfolio-amd64-${{ needs.build-amd64.outputs.hash }} \
            johngh/personal-website:portfolio-arm64-${{ needs.build-amd64.outputs.hash }}