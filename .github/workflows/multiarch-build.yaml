name: Build Portfolio Multiarch

permissions:
  contents: read
  packages: write

on:
  workflow_call:
    inputs:
      push_image:
        required: false
        type: boolean
        default: false
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

env:
  DOCKERHUB_REPO: johngh/portfolio-website
  GHCR_REPO: ghcr.io/john-ghatas/portfolio-website


jobs:
  build-amd64:
    runs-on: ubuntu-latest

    outputs:
      hash: ${{ steps.vars.outputs.hash }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Get short commit hash
        id: vars
        run: echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v4

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build AMD64 (local)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: frontend-prod
          platforms: linux/amd64
          load: true
          push: false
          tags: local-portfolio:website

      - name: Run audit
        run: |
          docker run --rm local-portfolio:website \
            sh -c "pnpm i && pnpm audit"

      - name: Build & Push AMD64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: frontend-prod
          platforms: linux/amd64
          push: ${{ inputs.push_image }}
          tags: |
            ${{ env.DOCKERHUB_REPO }}:amd64-${{ steps.vars.outputs.hash }}
            ${{ env.GHCR_REPO }}:amd64-${{ steps.vars.outputs.hash }}

  build-arm64:
    runs-on: ubuntu-24.04-arm
    needs: build-amd64

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Get hash
        run: echo "HASH=${{ needs.build-amd64.outputs.hash }}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v4

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push ARM64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: frontend-prod
          platforms: linux/arm64
          push: ${{ inputs.push_image }}
          tags: |
            ${{ env.DOCKERHUB_REPO }}:arm64-${{ env.HASH }}
            ${{ env.GHCR_REPO }}:arm64-${{ env.HASH }}


  publish:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    if: ${{ inputs.push_image }}

    steps:
      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Create multi-arch manifests (latest)
        run: |
          HASH=${{ needs.build-amd64.outputs.hash }}

          # -------------------------
          # Docker Hub
          # -------------------------
          docker buildx imagetools create \
            -t ${{ env.DOCKERHUB_REPO }}:live \
            -t ${{ env.DOCKERHUB_REPO }}:live-$HASH \
            -t ${{ env.DOCKERHUB_REPO }}:latest \
            -t ${{ env.DOCKERHUB_REPO }}:latest-$HASH \
            ${{ env.DOCKERHUB_REPO }}:amd64-$HASH \
            ${{ env.DOCKERHUB_REPO }}:arm64-$HASH

          # -------------------------
          # GHCR
          # -------------------------
          docker buildx imagetools create \
            -t ${{ env.GHCR_REPO }}:live \
            -t ${{ env.GHCR_REPO }}:live-$HASH \
            -t ${{ env.GHCR_REPO }}:latest \
            -t ${{ env.GHCR_REPO }}:latest-$HASH \
            ${{ env.GHCR_REPO }}:amd64-$HASH \
            ${{ env.GHCR_REPO }}:arm64-$HASH
