name: CI - Validate PR

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches:
      - "**"

jobs:
  validate-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Validate All Commit Messages
        uses: wagoid/commitlint-github-action@v6
  build:
    uses: ./.github/workflows/multiarch-build.yaml
    with:
      push_image: false
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
